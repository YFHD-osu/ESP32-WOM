<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網路喚醒</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
         
    <!-- iOS spinner animation from https://github.com/swordray/ispinner?tab=readme-ov-file -->
    <link rel="stylesheet" media="all" href="ispinner.prefixed.css">

    <!-- Script -->
    <script src="script.js"></script> 

    <!-- MQTT Pacakge -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <!-- Website logo -->
    <link rel="icon" type="image/svg+xml" href="https://upload.wikimedia.org/wikipedia/commons/7/73/Arduino_IDE_logo.svg" >
    
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="login-card-inner">
                <div class="login-header">
                    <div class="wake-logo">
                        <i class="bi bi-plugin"></i>
                    </div>
                    <h1 class="login-title"> 登入喚醒系統 </h1>
                </div>
                
                <form id="loginForm" class="login-form">
                    <div class="input-group-stacked">
                        <div class="form-floating">
                            <input name="username" type="text" class="form-control" id="appleID" placeholder="Apple ID" required>
                            <label for="appleID">帳號</label>
                        </div>
                        <div class="password-wrapper">
                            <div class="form-floating">
                                <input name="password" type="password" class="form-control" id="password" placeholder="密碼" required>
                                <label for="password">密碼</label>
                                <button type="submit" class="btn-signin-inline">
                                    <i class="bi bi-arrow-right-circle-fill fs-3"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
                
                <div id="listContainer" class="list-container">
                    <div class="list-header">
                        <h2>系統列表</h2>
                    </div>
                    <div class="device-list-container">
                        <div id="device-list-loading" class="device-list-loading">
                            <div class="loading-indicator">
                                <div class="ispinner">
                                    <div class="ispinner-blade"></div>
                                    <div class="ispinner-blade"></div>
                                    <div class="ispinner-blade"></div>
                                    <div class="ispinner-blade"></div>
                                    <div class="ispinner-blade"></div>
                                    <div class="ispinner-blade"></div>
                                    <div class="ispinner-blade"></div>
                                    <div class="ispinner-blade"></div>
                                </div>
                            </div>
                        </div>
                        <ul id="device-list" class="device-list"></ul>
                    </div>

                    <div class="list-actions">
                        <button id="logoutBtn" class="btn-action btn-logout">
                            <i class="bi bi-box-arrow-right"></i>
                            登出
                        </button>
                    </div>
                </div>
            </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center">
            <div class="mb-2 mb-md-0">
                <a href="https://github.com/YFHD-osu/ESP32-WOM"> ESP32-WOM</a>
                is made by 
                <a href="https://github.com/YFHD-osu"> YFHD-osu </a>
                with 🩷
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        
    </script>
</body>
</html>
